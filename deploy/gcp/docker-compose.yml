services:
  cloudsql-proxy:
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.18.2
    command:
      - "--auto-iam-authn"
      - "--address=0.0.0.0"
      - "--port=5432"
      - "${CLOUD_SQL_INSTANCE_CONNECTION_NAME}"
    restart: unless-stopped

  ghreplica:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      - cloudsql-proxy
    command: ["serve"]
    volumes:
      - /home/bob/ghreplica/secrets:/home/bob/ghreplica/secrets:ro
      - /home/bob/ghreplica/data:/app/data
    environment:
      APP_ADDR: ":8080"
      DATABASE_URL: "postgres://${DB_IAM_USER_URLENCODED}@cloudsql-proxy:5432/${DB_NAME}?sslmode=disable"
      GIT_MIRROR_ROOT: "/app/data/git-mirrors"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET}"
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_APP_INSTALLATION_ID: "${GITHUB_APP_INSTALLATION_ID:-}"
      GITHUB_APP_PRIVATE_KEY_PATH: "${GITHUB_APP_PRIVATE_KEY_PATH:-}"
      REPO_MIN_FETCH_INTERVAL: "${REPO_MIN_FETCH_INTERVAL:-}"
      REPO_CHANGE_LEASE_TTL: "${REPO_CHANGE_LEASE_TTL:-}"
      OPEN_PR_BACKFILL_INTERVAL: "${OPEN_PR_BACKFILL_INTERVAL:-}"
      REPO_BACKFILL_MAX_RUNTIME: "${REPO_BACKFILL_MAX_RUNTIME:-}"
      REPO_BACKFILL_MAX_PRS: "${REPO_BACKFILL_MAX_PRS:-}"
      GIT_INDEX_TIMEOUT: "${GIT_INDEX_TIMEOUT:-}"
    restart: unless-stopped

  ghreplica-migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      - cloudsql-proxy
    volumes:
      - /home/bob/ghreplica/secrets:/home/bob/ghreplica/secrets:ro
      - /home/bob/ghreplica/data:/app/data
    environment:
      DATABASE_URL: "postgres://${DB_IAM_USER_URLENCODED}@cloudsql-proxy:5432/${DB_NAME}?sslmode=disable"
      GIT_MIRROR_ROOT: "/app/data/git-mirrors"
    command: ["migrate", "up"]
    profiles:
      - ops

  caddy:
    image: caddy:2.10.2
    depends_on:
      - ghreplica
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
