services:
  ghreplica:
    build:
      context: ../..
      dockerfile: Dockerfile
    command: ["serve"]
    volumes:
      - /home/bob/ghreplica/secrets:/home/bob/ghreplica/secrets:ro
      - /home/bob/ghreplica/data:/app/data
    environment:
      APP_ADDR: ":8080"
      DB_DIALER: "${DB_DIALER:-cloudsql}"
      DATABASE_URL: "postgres://${DB_IAM_USER_URLENCODED}@localhost:5432/${DB_NAME}?sslmode=disable"
      CLOUDSQL_INSTANCE_CONNECTION_NAME: "${CLOUD_SQL_INSTANCE_CONNECTION_NAME:-}"
      CLOUDSQL_USE_IAM_AUTHN: "${CLOUDSQL_USE_IAM_AUTHN:-}"
      DB_CONTROL_MAX_OPEN_CONNS: "${DB_CONTROL_MAX_OPEN_CONNS:-}"
      DB_CONTROL_MAX_IDLE_CONNS: "${DB_CONTROL_MAX_IDLE_CONNS:-}"
      DB_QUEUE_MAX_OPEN_CONNS: "${DB_QUEUE_MAX_OPEN_CONNS:-}"
      DB_QUEUE_MAX_IDLE_CONNS: "${DB_QUEUE_MAX_IDLE_CONNS:-}"
      DB_SYNC_MAX_OPEN_CONNS: "${DB_SYNC_MAX_OPEN_CONNS:-}"
      DB_SYNC_MAX_IDLE_CONNS: "${DB_SYNC_MAX_IDLE_CONNS:-}"
      GIT_MIRROR_ROOT: "/app/data/git-mirrors"
      GITHUB_TOKEN: "${GITHUB_TOKEN}"
      GITHUB_WEBHOOK_SECRET: "${GITHUB_WEBHOOK_SECRET}"
      GITHUB_APP_ID: "${GITHUB_APP_ID:-}"
      GITHUB_APP_INSTALLATION_ID: "${GITHUB_APP_INSTALLATION_ID:-}"
      GITHUB_APP_PRIVATE_KEY_PATH: "${GITHUB_APP_PRIVATE_KEY_PATH:-}"
      CHANGE_SYNC_POLL_INTERVAL: "${CHANGE_SYNC_POLL_INTERVAL:-}"
      WEBHOOK_REFRESH_DEBOUNCE: "${WEBHOOK_REFRESH_DEBOUNCE:-}"
      OPEN_PR_INVENTORY_MAX_AGE: "${OPEN_PR_INVENTORY_MAX_AGE:-}"
      REPO_CHANGE_LEASE_TTL: "${REPO_CHANGE_LEASE_TTL:-}"
      BACKFILL_MAX_RUNTIME: "${BACKFILL_MAX_RUNTIME:-}"
      BACKFILL_MAX_PRS_PER_PASS: "${BACKFILL_MAX_PRS_PER_PASS:-}"
      WEBHOOK_JOB_QUEUE_CONCURRENCY: "${WEBHOOK_JOB_QUEUE_CONCURRENCY:-}"
      WEBHOOK_JOB_TIMEOUT: "${WEBHOOK_JOB_TIMEOUT:-}"
      WEBHOOK_JOB_MAX_ATTEMPTS: "${WEBHOOK_JOB_MAX_ATTEMPTS:-}"
      GIT_INDEX_TIMEOUT: "${GIT_INDEX_TIMEOUT:-}"
      AST_GREP_TIMEOUT: "${AST_GREP_TIMEOUT:-}"
      AST_GREP_BIN: "${AST_GREP_BIN:-}"
    restart: unless-stopped

  ghreplica-migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
    volumes:
      - /home/bob/ghreplica/secrets:/home/bob/ghreplica/secrets:ro
      - /home/bob/ghreplica/data:/app/data
    environment:
      DB_DIALER: "${DB_DIALER:-cloudsql}"
      DATABASE_URL: "postgres://${DB_IAM_USER_URLENCODED}@localhost:5432/${DB_NAME}?sslmode=disable"
      CLOUDSQL_INSTANCE_CONNECTION_NAME: "${CLOUD_SQL_INSTANCE_CONNECTION_NAME:-}"
      CLOUDSQL_USE_IAM_AUTHN: "${CLOUDSQL_USE_IAM_AUTHN:-}"
      GIT_MIRROR_ROOT: "/app/data/git-mirrors"
    command: ["migrate", "up"]
    profiles:
      - ops

  caddy:
    image: caddy:2.10.2
    depends_on:
      - ghreplica
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
