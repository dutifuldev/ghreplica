services:
  postgres:
    image: postgres:16-alpine
    container_name: ghreplica-postgres
    environment:
      POSTGRES_DB: ghreplica
      POSTGRES_USER: ghreplica
      POSTGRES_PASSWORD: ghreplica
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghreplica -d ghreplica"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - ghreplica-postgres-data:/var/lib/postgresql/data

volumes:
  ghreplica-postgres-data:
